<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MQL Lead Router — Wolters Kluwer CDI</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #070C1A;
    --surface:   #0D1527;
    --card:      #121E35;
    --card-alt:  #0F1A2E;
    --border:    #1C3054;
    --border-hi: #2A4A7F;
    --accent:    #3B82F6;
    --accent-dim:#1D4ED8;
    --glow:      rgba(59,130,246,.18);
    --text:      #D9E4F5;
    --muted:     #5A7299;
    --bright:    #EBF2FF;
    --green:     #10B981;
    --red:       #F87171;
    --yellow:    #FBBF24;
    --radius:    10px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  header .brand { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
  header h1 { font-size: 15px; font-weight: 600; color: var(--bright); border-left: 1px solid var(--border); padding-left: 14px; margin-left: 2px; }

  /* ── Page shell (flex column fills viewport below header) ── */
  .page-shell {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 52px);
  }

  /* ── Main layout ── */
  .layout {
    display: grid;
    grid-template-columns: 400px 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* ── Left panel ── */
  .form-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 20px;
    gap: 12px;
    overflow: hidden;
  }
  .panel-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

  .paste-hint {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
  }
  .paste-hint strong { color: var(--text); }

  .lead-textarea {
    flex: 1;
    resize: none;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    font-size: 13px;
    color: var(--text);
    font-family: "Cascadia Code", "Fira Code", Consolas, monospace;
    line-height: 1.65;
    transition: border-color .2s, box-shadow .2s;
    outline: none;
  }
  .lead-textarea::placeholder { color: var(--muted); }
  .lead-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }

  .char-count {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    transition: color .2s;
  }
  .char-count.warn { color: var(--yellow); }
  .char-count.over { color: var(--red); font-weight: 700; }

  .btn-row { display: flex; gap: 10px; }

  .new-lead-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .new-lead-btn:hover { border-color: var(--border-hi); color: var(--text); }

  .submit-btn {
    flex: 1;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s, box-shadow .15s, transform .1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: .3px;
  }
  .submit-btn:hover { background: var(--accent-dim); box-shadow: 0 0 16px var(--glow); }
  .submit-btn:active { transform: scale(.98); }
  .submit-btn:disabled { background: #1C2E4A; color: var(--muted); cursor: not-allowed; box-shadow: none; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.25);
    border-top-color: white;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Right panel ── */
  .result-panel {
    overflow-y: auto;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: var(--bg);
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    text-align: center;
    gap: 14px;
  }
  .empty-state svg { opacity: .2; }
  .empty-state p { font-size: 13px; line-height: 1.7; }

  /* ── Loading dots ── */
  .loading-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 0 40px;
    gap: 20px;
  }
  .loading-dots { display: flex; gap: 8px; }
  .loading-dots span {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse-dot 1.2s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: .2s; }
  .loading-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse-dot {
    0%, 80%, 100% { transform: scale(.5); opacity: .25; }
    40%            { transform: scale(1);  opacity: 1; }
  }
  .loading-label { font-size: 12px; color: var(--muted); letter-spacing: .3px; }

  /* ── Decision badge ── */
  .decision-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 13px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .6px;
  }
  .badge-valid        { background: rgba(16,185,129,.15);  color: #34D399; border: 1px solid rgba(16,185,129,.3); }
  .badge-individual   { background: rgba(251,191,36,.12);  color: #FCD34D; border: 1px solid rgba(251,191,36,.3); }
  .badge-support      { background: rgba(59,130,246,.12);  color: #60A5FA; border: 1px solid rgba(59,130,246,.3); }
  .badge-commercial   { background: rgba(167,139,250,.12); color: #C4B5FD; border: 1px solid rgba(167,139,250,.3); }
  .badge-scam         { background: rgba(248,113,113,.12); color: #FCA5A5; border: 1px solid rgba(248,113,113,.3); }
  .badge-international{ background: rgba(100,116,139,.12); color: #94A3B8; border: 1px solid rgba(100,116,139,.3); }
  .badge-clarification{ background: rgba(251,191,36,.12);  color: #FCD34D; border: 1px solid rgba(251,191,36,.3); }

  /* ── Result cards ── */
  @keyframes card-in {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: card-in .28s ease both;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--card-alt);
    border-bottom: 1px solid var(--border);
  }
  .card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--accent); }
  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }

  .card-body { padding: 16px; font-size: 13.5px; line-height: 1.65; color: var(--text); }

  .card-body pre {
    background: #0A1020;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-size: 12.5px;
    white-space: pre-wrap;
    font-family: "Cascadia Code", "Fira Code", Consolas, monospace;
    color: #A8C4E8;
    overflow-x: auto;
  }
  .card-body code { background: #0A1020; padding: 1px 5px; border-radius: 4px; font-size: 12.5px; font-family: monospace; color: #7DD3FC; }
  .card-body ul { padding-left: 18px; }
  .card-body li { margin-bottom: 4px; }
  .card-body strong { font-weight: 700; color: var(--bright); }
  .card-body em { font-style: italic; color: var(--muted); }
  .card-body p { margin-bottom: 10px; }
  .card-body h3 { font-size: 11px; font-weight: 700; margin: 14px 0 6px; color: var(--accent); text-transform: uppercase; letter-spacing: .5px; }

  /* ── Checklist ── */
  .checklist { list-style: none; padding: 0; }
  .checklist li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(28,48,84,.6);
    font-size: 13.5px;
  }
  .checklist li:last-child { border-bottom: none; }
  .check-box {
    width: 16px; height: 16px; min-width: 16px;
    border: 2px solid var(--border-hi);
    border-radius: 4px;
    margin-top: 2px;
    cursor: pointer;
    transition: all .15s;
    position: relative;
  }
  .check-box.done { background: var(--green); border-color: var(--green); }
  .check-box.done::after { content: "✓"; position: absolute; color: white; font-size: 11px; left: 1px; top: -1px; }
  .checklist li.done-item { opacity: .45; text-decoration: line-through; }

  /* ── Rich error block ── */
  .error-block {
    background: rgba(248,113,113,.07);
    border: 1px solid rgba(248,113,113,.25);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .error-header { display: flex; align-items: center; gap: 10px; }
  .error-icon { font-size: 16px; }
  .error-category {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .8px;
    text-transform: uppercase;
    background: rgba(248,113,113,.15);
    border-radius: 4px;
    padding: 2px 7px;
    color: var(--red);
  }
  .error-detail { font-size: 13px; color: var(--text); line-height: 1.6; }
  .error-hint {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.55;
    border-top: 1px solid rgba(248,113,113,.15);
    padding-top: 8px;
    margin-top: 2px;
  }

  /* ── History bar ── */
  .history-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 28px;
    height: 36px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    cursor: pointer;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--muted);
    user-select: none;
    transition: color .15s;
    flex-shrink: 0;
  }
  .history-toggle:hover { color: var(--text); }
  .hist-arrow { transition: transform .25s; }
  .history-toggle.open .hist-arrow { transform: rotate(180deg); }
  #histCount { color: var(--accent); }
  .hist-spacer { flex: 1; }
  .hist-clear {
    background: none;
    border: 1px solid rgba(248,113,113,.3);
    border-radius: 6px;
    padding: 2px 10px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    color: var(--red);
    cursor: pointer;
    transition: all .15s;
  }
  .hist-clear:hover { background: rgba(248,113,113,.1); }

  .history-panel {
    background: var(--surface);
    border-top: 1px solid var(--border);
    max-height: 0;
    overflow: hidden;
    transition: max-height .35s ease;
    flex-shrink: 0;
  }
  .history-panel.open { max-height: 300px; }
  .history-list {
    overflow-y: auto;
    max-height: 260px;
    padding: 10px 28px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .history-entry {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .history-entry:hover { border-color: var(--accent); }
  .hist-time { font-size: 11px; color: var(--muted); white-space: nowrap; min-width: 68px; }
  .hist-company { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; overflow: auto; }
    .form-panel { height: 55vh; border-right: none; border-bottom: 1px solid var(--border); }
    .result-panel { padding: 16px; }
    .history-toggle { padding: 0 16px; }
    .history-list { padding: 10px 16px 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <div class="brand">Wolters Kluwer CDI</div>
  <h1>MQL Lead Router</h1>
</header>

<div class="page-shell">
  <div class="layout">

    <!-- ── Form panel ── -->
    <div class="form-panel">
      <div class="panel-label">Lead Input</div>

      <div class="paste-hint">
        Paste the full Salesforce lead record. The AI will extract all relevant fields automatically.
      </div>

      <textarea
        class="lead-textarea"
        id="rawLead"
        placeholder="Paste Salesforce lead record here…

Example:
First Name: John
Last Name: Smith
Email: j.smith@generalhospital.org
Title: Director of Pharmacy
Company: General Hospital
City / State: Dallas, TX
Product Interest: Lexicomp
Number of Users: 45 pharmacists
Comments: Evaluating drug reference tools for our pharmacy department.
Lead Source: Website form fill
Existing Customer: No"
      ></textarea>

      <div class="char-count" id="charCount">0 / 8,000</div>

      <div class="btn-row">
        <button class="new-lead-btn" id="newLeadBtn" onclick="newLead()" style="display:none">✕ Clear</button>
        <button class="submit-btn" id="submitBtn" onclick="submitLead()">
          <span id="btnText">Generate Action Packet</span>
          <div class="spinner" id="spinner"></div>
        </button>
      </div>
    </div>

    <!-- ── Result panel ── -->
    <div class="result-panel" id="resultPanel">
      <div class="empty-state" id="emptyState">
        <svg width="56" height="56" viewBox="0 0 64 64" fill="none">
          <rect x="8" y="8" width="48" height="48" rx="10" stroke="#3B82F6" stroke-width="1.5"/>
          <path d="M20 32h24M20 22h24M20 42h16" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <p>Paste a Salesforce lead record on the left<br>and click <strong style="color:#D9E4F5">Generate Action Packet</strong><br><span style="font-size:11px;color:#5A7299;display:block;margin-top:4px">Ctrl + Enter to submit</span></p>
      </div>
      <div id="resultContent" style="display:none; flex-direction:column; gap:14px;"></div>
    </div>

  </div><!-- /.layout -->

  <!-- ── History bar ── -->
  <div class="history-toggle" id="histToggle" onclick="toggleHistory()">
    <svg class="hist-arrow" width="11" height="11" viewBox="0 0 16 16" fill="currentColor">
      <path d="M8 4l5 7H3l5-7z"/>
    </svg>
    <span>Recent Leads</span>
    <span id="histCount"></span>
    <div class="hist-spacer"></div>
    <button class="hist-clear" onclick="clearHistory(event)">Clear All</button>
  </div>
  <div class="history-panel" id="histPanel">
    <div class="history-list" id="histList"></div>
  </div>

</div><!-- /.page-shell -->

<script>
// ── Utilities ────────────────────────────────────────────────────────────────

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Character counter ─────────────────────────────────────────────────────────

const textarea = document.getElementById('rawLead');
const charCount = document.getElementById('charCount');

textarea.addEventListener('input', function() {
  const len = this.value.length;
  charCount.textContent = `${len.toLocaleString()} / 8,000`;
  charCount.className = 'char-count';
  if (len > 8000)      charCount.classList.add('over');
  else if (len > 3000) charCount.classList.add('warn');
});

// ── Error display ─────────────────────────────────────────────────────────────

const ERROR_META = {
  timeout:    { icon: '⏱', category: 'Timeout',    hint: 'The AI service took too long. Click Generate again — it usually succeeds on retry.' },
  auth:       { icon: '🔑', category: 'Auth Error', hint: 'The API key is missing or invalid. Check the GROQ_API_KEY in the .env file.' },
  rate_limit: { icon: '⏳', category: 'Rate Limit', hint: 'Too many requests. Wait about 60 seconds then try again.' },
  input:      { icon: '✏️', category: 'Input',      hint: 'Check the length and content of the pasted text.' },
  unknown:    { icon: '⚠️', category: 'Error',      hint: 'Something unexpected happened. Try again or contact support.' },
};

function renderError(container, message, errorType) {
  const meta = ERROR_META[errorType] || ERROR_META.unknown;
  container.innerHTML = `
    <div class="error-block">
      <div class="error-header">
        <span class="error-icon">${meta.icon}</span>
        <span class="error-category">${meta.category}</span>
      </div>
      <div class="error-detail">${escHtml(message)}</div>
      <div class="error-hint">${escHtml(meta.hint)}</div>
    </div>
  `;
}

// ── Submit ────────────────────────────────────────────────────────────────────

async function submitLead() {
  const raw = textarea.value.trim();
  if (!raw) { textarea.focus(); return; }

  const btn     = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');

  btn.disabled = true;
  btnText.textContent = 'Routing…';
  spinner.style.display = 'block';

  document.getElementById('emptyState').style.display = 'none';
  const content = document.getElementById('resultContent');
  content.style.display = 'flex';
  content.innerHTML = `
    <div class="loading-wrap">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <div class="loading-label">Routing lead — this takes 10–20 seconds</div>
    </div>
  `;

  try {
    const res = await fetch('/process', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ raw_text: raw })
    });
    const json = await res.json();
    if (json.error) {
      renderError(content, json.error, json.error_type || 'unknown');
    } else {
      renderResult(content, json.result);
      addHistoryEntry(json.result);
      document.getElementById('newLeadBtn').style.display = 'block';
    }
  } catch(e) {
    renderError(content, e.message, 'unknown');
  } finally {
    btn.disabled = false;
    btnText.textContent = 'Generate Action Packet';
    spinner.style.display = 'none';
  }
}

function newLead() {
  textarea.value = '';
  charCount.textContent = '0 / 8,000';
  charCount.className = 'char-count';
  document.getElementById('resultContent').style.display = 'none';
  document.getElementById('resultContent').innerHTML = '';
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('newLeadBtn').style.display = 'none';
  textarea.focus();
}

// ── Result rendering ──────────────────────────────────────────────────────────

function renderResult(container, markdown) {
  const sections = markdown.split(/\n(?=## )/);
  container.innerHTML = '';

  const decisionMatch = markdown.match(/## DECISION\s*\n([\s\S]*?)(?=\n---|\n##)/);
  const decisionText  = decisionMatch ? decisionMatch[1] : '';
  container.appendChild(makeCard('Routing Decision', getBadge(decisionText) + mdToHtml(decisionText), markdown, 0));

  const sectionMap = {
    'SFDC CHECKLIST':     { title: 'SFDC Checklist',    isChecklist: true },
    'QUALIFICATION NOTE': { title: 'Qualification Note', isCode: true },
    'SALESFORCE NOTE':    { title: 'Salesforce Note',   isCode: true },
    'EMAIL TO REP':       { title: 'Email to Rep' },
    'EMAIL TO LEAD':      { title: 'Email to Lead' },
    'ROUTING NOTES':      { title: 'Routing Notes' },
  };

  let idx = 1;
  sections.forEach(section => {
    const headMatch = section.match(/^## ([A-Z ]+)/);
    if (!headMatch || headMatch[1].trim() === 'DECISION') return;
    const key  = headMatch[1].trim();
    const meta = sectionMap[key] || { title: key };
    const body = section.replace(/^## [A-Z ]+\n/, '').trim();
    if (!body) return;

    let rendered, copyPayload;
    if (meta.isChecklist) {
      rendered    = renderChecklist(body);
      copyPayload = body;
    } else if (meta.isCode) {
      const codeMatch = body.match(/```([\s\S]*?)```/);
      const code      = codeMatch ? codeMatch[1].trim() : body;
      rendered    = `<pre>${escHtml(code)}</pre>` + mdToHtml(body.replace(/```[\s\S]*?```/, ''));
      copyPayload = code;
    } else {
      rendered    = mdToHtml(body);
      copyPayload = body;
    }

    container.appendChild(makeCard(meta.title, rendered, copyPayload, idx++));
  });
}

function getBadge(text) {
  const t = text.toUpperCase();
  let cls = 'badge-valid', label = 'Valid Sales';
  if      (t.includes('INDIVIDUAL'))    { cls = 'badge-individual';     label = 'Individual Segment'; }
  else if (t.includes('SUPPORT'))       { cls = 'badge-support';        label = 'Support'; }
  else if (t.includes('COMMERCIAL'))    { cls = 'badge-commercial';     label = 'Commercial'; }
  else if (t.includes('SCAM'))          { cls = 'badge-scam';           label = 'Scam — Disqualify'; }
  else if (t.includes('INTERNATIONAL')) { cls = 'badge-international';  label = 'International'; }
  else if (t.includes('CLARIFICATION')) { cls = 'badge-clarification';  label = 'Needs Clarification'; }
  return `<div style="margin-bottom:12px"><span class="decision-badge ${cls}">${label}</span></div>`;
}

function mdToHtml(md) {
  if (!md) return '';
  let html = escHtml(md);
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/`([^`]+)`/g,     '<code>$1</code>');
  html = html.replace(/^[-*] (.+)$/gm,  '<li>$1</li>');
  html = html.replace(/(<li>[\s\S]*?<\/li>)/g, m => `<ul>${m}</ul>`);
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g,   '<br>');
  return `<p>${html}</p>`;
}

function renderChecklist(md) {
  const lines = md.split('\n');
  let html = '', inList = false;
  lines.forEach(line => {
    const taskMatch    = line.match(/^[-*]?\s*\[ \]\s*(.+)$/);
    const headMatch    = line.match(/^\*\*(.+?):\*\*\s*$/);
    const sectionMatch = line.match(/^\[(IF .+?)\]/);
    if (headMatch) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<h3>${escHtml(headMatch[1])}</h3>`;
    } else if (sectionMatch) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<p style="margin-top:8px;font-size:11px;color:#5A7299;font-style:italic">${escHtml(sectionMatch[1])}</p>`;
    } else if (taskMatch) {
      if (!inList) { html += '<ul class="checklist">'; inList = true; }
      const id = 'chk_' + Math.random().toString(36).slice(2);
      html += `<li id="${id}"><div class="check-box" onclick="toggleCheck('${id}')"></div><span>${escHtml(taskMatch[1])}</span></li>`;
    } else if (line.trim()) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<p style="margin-top:6px">${escHtml(line)}</p>`;
    }
  });
  if (inList) html += '</ul>';
  return html;
}

function makeCard(title, htmlContent, rawText, index) {
  const card   = document.createElement('div');
  const copyId = 'copy_' + Math.random().toString(36).slice(2);
  card.className = 'result-card';
  card.style.animationDelay = (index * 65) + 'ms';
  card.innerHTML = `
    <div class="card-header">
      <span class="card-title">${escHtml(title)}</span>
      <button class="copy-btn" id="${copyId}">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor">
          <path d="M4 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm0 1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1H4z"/>
        </svg>
        Copy
      </button>
    </div>
    <div class="card-body">${htmlContent}</div>
  `;
  card.querySelector(`#${copyId}`).addEventListener('click', function() {
    copyText(this, rawText);
  });
  return card;
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.75.75 0 0 1 1.06-1.06L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0z"/></svg> Copied!`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm0 1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1H4z"/></svg> Copy`;
    }, 2000);
  });
}

function toggleCheck(id) {
  const li = document.getElementById(id);
  li.querySelector('.check-box').classList.toggle('done');
  li.classList.toggle('done-item');
}

// ── History ───────────────────────────────────────────────────────────────────

const HISTORY_KEY = 'mql_history';
const MAX_HISTORY = 10;

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
  catch { return []; }
}
function saveHistory(entries) {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(entries));
}

function extractCompany(markdown) {
  const m = markdown.match(/COMPANY:\s*(.+)/i);
  if (m) return m[1].trim();
  const m2 = markdown.match(/\*\*Assigned to:\*\*\s*(.+)/i);
  return m2 ? m2[1].trim() : 'Unknown';
}

function extractDecision(markdown) {
  const m = markdown.match(/## DECISION\s*\n([A-Z_/ ]+)/);
  return m ? m[1].trim().split('\n')[0].trim() : 'UNKNOWN';
}

function addHistoryEntry(markdown) {
  const entries = loadHistory();
  entries.unshift({ id: Date.now(), ts: new Date().toISOString(), company: extractCompany(markdown), decision: extractDecision(markdown), markdown });
  if (entries.length > MAX_HISTORY) entries.length = MAX_HISTORY;
  saveHistory(entries);
  renderHistoryList();
}

function formatRelTime(iso) {
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 60)    return 'just now';
  if (diff < 3600)  return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
  return new Date(iso).toLocaleDateString();
}

function decisionBadgeClass(decision) {
  const t = decision.toUpperCase();
  if (t.includes('INDIVIDUAL'))    return 'badge-individual';
  if (t.includes('SUPPORT'))       return 'badge-support';
  if (t.includes('COMMERCIAL'))    return 'badge-commercial';
  if (t.includes('SCAM'))          return 'badge-scam';
  if (t.includes('INTERNATIONAL')) return 'badge-international';
  if (t.includes('CLARIFICATION')) return 'badge-clarification';
  return 'badge-valid';
}

function renderHistoryList() {
  const entries = loadHistory();
  const list    = document.getElementById('histList');
  const countEl = document.getElementById('histCount');
  countEl.textContent = entries.length ? `(${entries.length})` : '';

  if (!entries.length) {
    list.innerHTML = `<div style="color:var(--muted);font-size:12px;padding:8px 0">No history yet — processed leads will appear here.</div>`;
    return;
  }

  list.innerHTML = entries.map(e => `
    <div class="history-entry" onclick="restoreHistory(${e.id})">
      <span class="hist-time">${formatRelTime(e.ts)}</span>
      <span class="hist-company">${escHtml(e.company)}</span>
      <span class="decision-badge ${decisionBadgeClass(e.decision)}" style="font-size:10px;padding:2px 8px">${escHtml(e.decision.slice(0,20))}</span>
    </div>
  `).join('');
}

function toggleHistory() {
  document.getElementById('histPanel').classList.toggle('open');
  document.getElementById('histToggle').classList.toggle('open');
}

function clearHistory(event) {
  event.stopPropagation();
  localStorage.removeItem(HISTORY_KEY);
  renderHistoryList();
}

function restoreHistory(id) {
  const entry = loadHistory().find(e => e.id === id);
  if (!entry) return;
  document.getElementById('emptyState').style.display = 'none';
  const content = document.getElementById('resultContent');
  content.style.display = 'flex';
  renderResult(content, entry.markdown);
  document.getElementById('newLeadBtn').style.display = 'block';
  document.getElementById('resultPanel').scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Keyboard shortcut ─────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) submitLead();
});

// ── Init ──────────────────────────────────────────────────────────────────────

renderHistoryList();
</script>
